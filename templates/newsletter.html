<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Daily Market Brief</title>
  <style>
    body { font-family: Arial, sans-serif; color: #111827; background: #f3f4f6; margin: 0; padding: 24px; }
    .container { max-width: 760px; margin: 0 auto; background: #ffffff; border-radius: 12px; padding: 28px; }
    h1 { font-size: 22px; margin: 0 0 6px; }
    .date { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
    h2 { font-size: 15px; margin-top: 24px; border-bottom: 1px solid #e5e7eb; padding-bottom: 6px; }
    ul { padding-left: 20px; }
    li { margin-bottom: 8px; line-height: 1.45; }
    .muted { color: #6b7280; }
    .footer { margin-top: 28px; font-size: 12px; color: #6b7280; }
    a { color: #1f2937; }
    pre { white-space: pre-wrap; font-family: Arial, sans-serif; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Daily Market Brief</h1>
    <div class="date">{{ run_date }}</div>
    <pre>{{ newsletter_text }}</pre>
    <div class="footer">
      Factual market brief only. No investment advice, recommendations, forecasts, or trading instructions.
    </div>
  </div>
</body>
</html>
